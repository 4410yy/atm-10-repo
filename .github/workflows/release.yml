name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  deployments: write
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install tools
        run: go install github.com/ikafly144/sabalauncher/v2/cmd/sbutils@latest
      - name: Restore Last Pack
        id: restore_pack
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          PACKS_DIR="${{ runner.temp }}/packs"
          mkdir -p "$PACKS_DIR"

          git switch packages || git checkout -b packages
          cp *.sbpack "$PACKS_DIR/" 2>/dev/null || true
          cp *.sbpatch "$PACKS_DIR/" 2>/dev/null || true

          cd "$PACKS_DIR"
          # Rebuild packs forward to ensure the base for the new patch is ready
          for TAG in $(git tag --sort=creatordate); do
            NEXT_TAG=$(git tag --sort=creatordate | grep -A1 "^$TAG$" | tail -n1)
            if [ "$TAG" != "$NEXT_TAG" ] && [ -f "$TAG.sbpack" ] && [ -f "$NEXT_TAG.sbpatch" ]; then
              sbutils patch "$TAG.sbpack" "$NEXT_TAG.sbpatch" "$NEXT_TAG.sbpack"
            fi
          done
      - name: Package and Commit
        run: |
          git checkout master --force
          PACKS_DIR="${{ runner.temp }}/packs"
          sbutils pack src/ "$PACKS_DIR/${{ github.ref_name }}.sbpack"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/sb.index.json
          git commit -m "Update sb.index.json for ${{ github.ref_name }}" || echo "No changes to index"
          git push origin master --force
      - name: Create Patch
        env:
          LAST_TAG: ${{ steps.restore_pack.outputs.last_tag }}
        run: |
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, skipping patch creation."
            exit 0
          fi
          PACKS_DIR="${{ runner.temp }}/packs"
          sbutils diff "$PACKS_DIR/${LAST_TAG}.sbpack" "$PACKS_DIR/${{ github.ref_name }}.sbpack" "$PACKS_DIR/${{ github.ref_name }}.sbpatch"
          sbutils split "$PACKS_DIR/${LAST_TAG}.sbpack" "$PACKS_DIR/${{ github.ref_name }}.sbpatch" "$PACKS_DIR/${{ github.ref_name }}" 100
      - name: Create Release
        id: release_files
        run: |
          PACKS_DIR="${{ runner.temp }}/packs"
          FILES=""
          if ls "$PACKS_DIR/${{ github.ref_name }}_"*.sbpatch 1> /dev/null 2>&1; then
            # If split parts exist, add them instead of the original
            for f in "$PACKS_DIR/${{ github.ref_name }}_"*.sbpatch; do
              FILES="${FILES}${f}"$'\n'
            done
          else
            # Add original patch
            FILES="$PACKS_DIR/${{ github.ref_name }}.sbpatch"
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.release_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to Package Branch
        run: |
          PACKS_DIR="${{ runner.temp }}/packs"
          if [ ! -f "$PACKS_DIR/${{ github.ref_name }}.sbpatch" ]; then
            echo "No patch file to push, skipping."
            exit 0
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout packages || git checkout -b packages

          # Initialize Git LFS and track large binary types
          git lfs install
          git lfs track "*.sbpack"
          git lfs track "*.sbpatch"
          git add .gitattributes

          # Use split parts if they exist, otherwise the original
          if ls "$PACKS_DIR/${{ github.ref_name }}_"*.sbpatch 1> /dev/null 2>&1; then
            cp "$PACKS_DIR/${{ github.ref_name }}_"*.sbpatch .
          else
            cp "$PACKS_DIR/${{ github.ref_name }}.sbpatch" .
          fi

          git add *.sbpatch
          git commit -m "Add package for ${{ github.ref_name }}"
          git push origin packages --force
      - name: Add package to manifest
        run: |
          PACKS_DIR="${{ runner.temp }}/packs"
          if [ ! -f "$PACKS_DIR/${{ github.ref_name }}.sbpatch" ]; then
            echo "No patch file, skipping manifest update."
            exit 0
          fi
          git checkout master --force

          # Determine which files to add (split parts or original)
          if ls "$PACKS_DIR/${{ github.ref_name }}_"*.sbpatch 1> /dev/null 2>&1; then
            PATCH_FILES=$(ls "$PACKS_DIR/${{ github.ref_name }}_"*.sbpatch | sort -V)
          else
            PATCH_FILES="$PACKS_DIR/${{ github.ref_name }}.sbpatch"
          fi

          # Add each patch file to the manifest
          for f in $PATCH_FILES; do
            FNAME=$(basename "$f")
            # Use filename without extension as ID (e.g., v1.0.0_0 or v1.0.0)
            ID="${FNAME%.sbpatch}"
            ASSET_URL=$(gh release view ${{ github.ref_name }} --json assets -q ".assets[] | select(.name == \"$FNAME\") | .url")
            sbutils repo add "$ID" sbpatch "$f" "${ASSET_URL}"
          done

          git add manifest.json
          git commit -m "Add package ${{ github.ref_name }} to manifest"
          git push origin master --force
